<!-- Modal Gestor de Temas (Fragmento) -->
<div class="modal fade" id="modalGestorTemas" tabindex="-1" aria-labelledby="modalGestorTemasLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-2xl bg-panel-sirio text-light-sirio">
            <div class="modal-header border-bottom border-white border-opacity-10 d-flex justify-content-between align-items-center">
                <h5 class="modal-title fw-bold text-accent-sirio mb-0" id="modalGestorTemasLabel">
                    <i class="fa-solid fa-tags me-2"></i>Gestor de Temas del Proyecto
                </h5>
                <div class="d-flex align-items-center gap-2">
                    <button type="button" id="btnNuevoTemaStandalone" class="btn btn-sirio-primary btn-sm rounded-pill px-3">
                        <i class="fa-solid fa-plus me-1"></i>Nuevo Tema
                    </button>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
            <div class="modal-body p-4">
                <div class="mb-4">
                    <div class="input-group">
                        <span class="input-group-text bg-black bg-opacity-25 border-end-0 text-accent-sirio">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="filterTemasInput" class="form-control form-control-sirio border-start-0" placeholder="Filtrar temas existentes...">
                    </div>
                </div>

                <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                    <table class="table table-dark table-hover mb-0 align-middle" style="--bs-table-bg: transparent;">
                        <thead class="sticky-top" style="z-index: 10;">
                            <tr class="bg-panel-sirio-alt">
                                <th class="ps-3 py-2 text-accent-sirio text-uppercase small fw-bold">Tema</th>
                                <th class="py-2 text-accent-sirio text-uppercase small fw-bold text-center">Usos</th>
                                <th class="pe-3 py-2 text-accent-sirio text-uppercase small fw-bold text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="temasTableBody">
                            <!-- Se cargará vía AJAX -->
                            <tr>
                                <td colspan="3" class="text-center py-4">
                                    <div class="spinner-border text-accent-sirio" role="status">
                                        <span class="visually-hidden">Cargando...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer border-top border-white border-opacity-10 bg-black bg-opacity-10 rounded-bottom-4">
                <button type="button" class="btn btn-sirio-outline rounded-pill px-4" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
