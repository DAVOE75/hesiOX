<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Nueva referencia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Roboto+Condensed:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body class="container py-4">
  <h1>Añadir referencia</h1>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <input class="form-control mb-2" name="titulo" placeholder="Título" required>
    <input class="form-control mb-2" name="publicacion" placeholder="Publicación">
    <input class="form-control mb-2" name="autor" placeholder="Autor">
    <input class="form-control mb-2" name="anio" placeholder="Año">
    <textarea class="form-control mb-2" name="contenido" placeholder="Contenido"></textarea>
    <button class="btn btn-primary">Guardar</button>
    <a href="/" class="btn btn-secondary">Volver</a>
  </form>
</body>

</html>
