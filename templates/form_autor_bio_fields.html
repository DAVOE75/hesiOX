<input type="hidden" id="bio_row_id" name="row_id">
<input type="hidden" id="bio_autor_id" name="autor_id"> <!-- ID en BD si existe -->

<!-- 1. Datos de Identificación -->
<div class="section-title mb-3 border-bottom border-warning border-opacity-25 pb-1 text-warning small fw-bold text-center">
    1. DATOS DE IDENTIFICACIÓN
</div>
<div class="row g-4 justify-content-center mb-4">
    <!-- Foto y Nombre Principal -->
    <div class="col-md-12 text-center">
        <div class="position-relative d-inline-block">
            <div id="bio_avatar_container" class="profile-avatar bio-avatar-sirio overflow-hidden mx-auto shadow-sm d-flex align-items-center justify-content-center">
                <i class="fa-solid fa-user" style="font-size: 3rem; color: #ffffff;"></i>
            </div>
            <button type="button" 
                class="btn btn-sm btn-dark position-absolute bottom-0 end-0 rounded-circle bio-camera-btn p-0 d-flex align-items-center justify-content-center" 
                style="width: 32px; height: 32px; transform: translate(5px, 5px);"
                onclick="document.getElementById('bio_foto_input').click()" title="Cambiar Foto">
                <i class="fa-solid fa-camera" style="font-size: 0.8rem;"></i>
            </button>
            <input type="file" id="bio_foto_input" name="foto_file" class="d-none" accept="image/*" onchange="previewBioFoto(this)">
            <input type="hidden" id="bio_foto" name="foto">
        </div>
        <div class="mt-3 small text-muted text-uppercase fw-bold" style="font-size: 0.65rem; letter-spacing: 1px; opacity: 0.7;">Retrato del Autor</div>
    </div>

    <!-- Datos Básicos -->
    <div class="col-md-10 mx-auto">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label-sirio">Nombre</label>
                <input type="text" id="bio_nombre" name="nombre" class="form-control form-control-sirio" placeholder="Nombre">
            </div>
            <div class="col-md-4">
                <label class="form-label-sirio">Apellido</label>
                <input type="text" id="bio_apellido" name="apellido" class="form-control form-control-sirio" placeholder="Apellido">
            </div>
            <div class="col-md-4">
                <label class="form-label-sirio">Seudónimo</label>
                <input type="text" id="bio_seudonimo" name="seudonimo" class="form-control form-control-sirio" placeholder="Nombre literario">
            </div>
            
            <div class="col-md-6">
                <label class="form-label-sirio">Lugar y Fecha de Nacimiento</label>
                <div class="row g-2">
                    <div class="col-7">
                        <input type="text" id="bio_lugar_nacimiento" name="lugar_nacimiento" class="form-control form-control-sirio" placeholder="Lugar (Ciudad, País)">
                    </div>
                    <div class="col-5">
                        <input type="text" id="bio_fecha_nacimiento" name="fecha_nacimiento" class="form-control form-control-sirio" placeholder="DD/MM/AAAA">
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label-sirio">Lugar y Fecha de Defunción</label>
                <div class="row g-2">
                    <div class="col-7">
                        <input type="text" id="bio_lugar_defuncion" name="lugar_defuncion" class="form-control form-control-sirio" placeholder="Lugar (Ciudad, País)">
                    </div>
                    <div class="col-5">
                        <input type="text" id="bio_fecha_defuncion" name="fecha_defuncion" class="form-control form-control-sirio" placeholder="DD/MM/AAAA">
                    </div>
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label-sirio">Nacionalidad</label>
                <input type="text" id="bio_nacionalidad" name="nacionalidad" class="form-control form-control-sirio" placeholder="Ej: Española, Mexicana, etc.">
            </div>
        </div>
    </div>
</div>

<!-- 2. Contexto y Trayectoria -->
<div class="section-title mt-4 mb-3 border-bottom border-warning border-opacity-25 pb-1 text-warning small fw-bold text-center">
    2. CONTEXTO Y TRAYECTORIA
</div>
<div class="row g-3 mb-3">
    <div class="col-md-12">
        <label class="form-label-sirio">Formación académica</label>
        <textarea id="bio_formacion_academica" name="formacion_academica" class="form-control form-control-sirio" rows="2" placeholder="Estudios e instituciones..."></textarea>
    </div>
    <div class="col-md-12">
        <label class="form-label-sirio">Ocupaciones secundarias</label>
        <input type="text" id="bio_ocupaciones_secundarias" name="ocupaciones_secundarias" class="form-control form-control-sirio" placeholder="Periodista, diplomático, etc.">
    </div>
    <div class="col-md-6">
        <label class="form-label-sirio">Movimiento o corriente literaria</label>
        <input type="text" id="bio_movimiento_literario" name="movimiento_literario" class="form-control form-control-sirio" placeholder="Ej: Romanticismo">
    </div>
    <div class="col-md-6">
        <label class="form-label-sirio">Influencias</label>
        <input type="text" id="bio_influencias" name="influencias" class="form-control form-control-sirio" placeholder="Autores o hechos clave">
    </div>
</div>

<!-- 3. Producción Literaria -->
<div class="section-title mt-4 mb-3 border-bottom border-warning border-opacity-25 pb-1 text-warning small fw-bold text-center">
    3. PRODUCCIÓN LITERARIA (OBRA)
</div>
<div class="row g-3 mb-3">
    <div class="col-md-6">
        <label class="form-label-sirio">Géneros literarios</label>
        <input type="text" id="bio_generos_literarios" name="generos_literarios" class="form-control form-control-sirio" placeholder="Novela, poesía, etc.">
    </div>
    <div class="col-md-6">
        <label class="form-label-sirio">Temáticas recurrentes</label>
        <input type="text" id="bio_tematicas_recurrentes" name="tematicas_recurrentes" class="form-control form-control-sirio" placeholder="Amor, muerte, crítica social...">
    </div>
    <div class="col-md-12">
        <label class="form-label-sirio">Obras principales</label>
        <textarea id="bio_obras_principales" name="obras_principales" class="form-control form-control-sirio" rows="3" placeholder="Listado de libros destacados (con año)..."></textarea>
    </div>
    <div class="col-md-12">
        <label class="form-label-sirio">Estilo</label>
        <textarea id="bio_estilo" name="estilo" class="form-control form-control-sirio" rows="2" placeholder="Descripción de su forma de escribir..."></textarea>
    </div>
</div>

<!-- 4. Reconocimientos y Legado -->
<div class="section-title mt-4 mb-3 border-bottom border-warning border-opacity-25 pb-1 text-warning small fw-bold text-center">
    4. RECONOCIMIENTOS Y LEGADO
</div>
<div class="row g-3 mb-3">
    <div class="col-md-12">
        <label class="form-label-sirio">Premios y galardones</label>
        <input type="text" id="bio_premios" name="premios" class="form-control form-control-sirio" placeholder="Nobel, Cervantes, etc.">
    </div>
    <div class="col-md-12">
        <label class="form-label-sirio">Impacto y trascendencia</label>
        <textarea id="bio_impacto" name="impacto" class="form-control form-control-sirio" rows="2" placeholder="Influencia en otros autores o cultura..."></textarea>
    </div>
</div>

<!-- 5. Información Adicional -->
<div class="section-title mt-4 mb-3 border-bottom border-warning border-opacity-25 pb-1 text-warning small fw-bold text-center">
    5. INFORMACIÓN ADICIONAL
</div>
<div class="row g-3">
    <div class="col-md-12">
        <label class="form-label-sirio">Bibliografía recomendada</label>
        <textarea id="bio_bibliografia" name="bibliografia" class="form-control form-control-sirio" rows="2" placeholder="Fuentes para profundizar..."></textarea>
    </div>
    <div class="col-md-12">
        <label class="form-label-sirio">Citas célebres</label>
        <textarea id="bio_citas" name="citas" class="form-control form-control-sirio" rows="2" placeholder="Frases destacadas..."></textarea>
    </div>
    <div class="col-md-12">
        <label class="form-label-sirio">Enlaces de interés</label>
        <input type="text" id="bio_enlaces" name="enlaces" class="form-control form-control-sirio" placeholder="Web oficial, fundaciones, entrevistas...">
    </div>
</div>
