{% extends "base.html" %}

{% block title %}hesiOX - Mi Perfil{% endblock %}

{% block extra_css %}
<style>
    .perfil-card {
        background-color: var(--card-bg, #1a1a1a);
        border: 1px solid var(--border-color, #333);
        border-radius: 12px;
        padding: 30px;
        margin-top: 20px;
    }
    .perfil-header {
        border-bottom: 2px solid var(--sirio-color, #ff9800);
        margin-bottom: 30px;
        padding-bottom: 15px;
    }
    .form-label {
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    .status-label {
        font-size: 0.75rem;
        font-weight: bold;
        margin-left: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        text-transform: uppercase;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="perfil-card shadow-lg animate__animated animate__fadeIn">
                <div class="perfil-header d-flex justify-content-between align-items-center">
                    <h2 class="text-warning mb-0">
                        <i class="fa-solid fa-user-circle me-2"></i>Configuración de Perfil
                    </h2>
                    <span class="badge bg-dark border border-secondary text-muted">v4.2.0</span>
                </div>
                
                <form action="{{ url_for('auth.perfil') }}" method="POST">
                    <div class="row g-4">
                        <!-- Datos Personales -->
                        <div class="col-md-12">
                            <h5 class="text-info border-bottom border-dark pb-2 mb-3">Datos de Cuenta</h5>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label text-warning">Nombre de Usuario</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" value="{{ current_user.nombre }}" readonly>
                            <div class="form-text text-muted">El nombre de usuario no es editable.</div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label text-warning">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control bg-dark text-white border-secondary" value="{{ current_user.email }}">
                        </div>

                        <!-- Configuración AI -->
                        <div class="col-md-12 mt-5">
                            <h5 class="text-info border-bottom border-dark pb-2 mb-3">Servicios de Inteligencia Artificial</h5>
                        </div>

                        <!-- OpenAI -->
                        <div class="col-md-6">
                            <div class="p-3 bg-black bg-opacity-25 rounded border border-dark">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label text-light mb-0">OpenAI API Key</label>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="ai_openai_active" 
                                               id="toggle-openai" {% if current_user.ai_openai_active %}checked{% endif %}>
                                    </div>
                                </div>
                                <input type="password" name="ai_openai_key" class="form-control bg-dark text-white border-secondary mb-2" 
                                       placeholder="sk-..." value="{{ current_user.ai_openai_key or '' }}">
                                <span id="status-openai" class="status-label" style="display: none; color:#22c55e;">ACTIVO</span>
                            </div>
                        </div>

                        <!-- Gemini -->
                        <div class="col-md-6">
                            <div class="p-3 bg-black bg-opacity-25 rounded border border-dark">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label text-light mb-0">Google Gemini API Key</label>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="ai_gemini_active"
                                               id="toggle-gemini" {% if current_user.ai_gemini_active %}checked{% endif %}>
                                    </div>
                                </div>
                                <input type="password" name="ai_gemini_key" class="form-control bg-dark text-white border-secondary mb-2" 
                                       placeholder="AIza..." value="{{ current_user.ai_gemini_key or '' }}">
                                <span id="status-gemini" class="status-label" style="display: none; color:#22c55e;">ACTIVO</span>
                            </div>
                        </div>

                        <!-- Anthropic -->
                        <div class="col-md-6">
                            <div class="p-3 bg-black bg-opacity-25 rounded border border-dark">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="form-label text-light mb-0">Anthropic Claude API Key</label>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="ai_anthropic_active"
                                               id="toggle_anthropic_active" {% if current_user.ai_anthropic_active %}checked{% endif %}>
                                    </div>
                                </div>
                                <input type="password" name="ai_anthropic_key" class="form-control bg-dark text-white border-secondary mb-2" 
                                       placeholder="sk-ant-..." value="{{ current_user.ai_anthropic_key or '' }}">
                                <span id="status-anthropic" class="status-label" style="display: none; color:#22c55e;">ACTIVO</span>
                            </div>
                        </div>

                        <div class="col-12 mt-5">
                            <hr class="border-secondary">
                            <div class="d-flex justify-content-end">
                                <button type="submit" class="btn btn-warning px-5 py-2 fw-bold">
                                    <i class="fa-solid fa-save me-2"></i>Guardar Cambios
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const models = ['openai', 'gemini', 'anthropic'];
        
        models.forEach(model => {
            const toggleId = model === 'anthropic' ? 'toggle_anthropic_active' : `toggle-${model}`;
            const toggle = document.getElementById(toggleId);
            const statusLabel = document.getElementById(`status-${model}`);
            
            if (toggle && statusLabel) {
                const checkStatus = () => {
                    statusLabel.style.display = toggle.checked ? 'inline' : 'none';
                };
                
                toggle.addEventListener('change', checkStatus);
                checkStatus(); // Initial state
            }
        });
    });
</script>
{% endblock %}
